name: OCapN Guile interop

# Mirrors the `test-ocapn-python` job in ci.yml but drives Endo `@endo/ocapn`
# as a client joining a Goblins (Guile)-hosted chatroom over the websocket netlayer.
#
# This currently targets Spritely git repos directly (both goblins + goblin-chat),
# pinned by commit. The flow asserts full Guile-hosted/Endo-joined interoperability:
# sturdyref publication, websocket session establishment, and bilateral message exchange.

on:
  pull_request:
    paths:
      - 'packages/ocapn/**'
      - 'packages/goblin-chat/**'
      - '.github/workflows/ocapn-guile-interop.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-ocapn-guile-interop:
    name: test-ocapn-guile-interop
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout Endo
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          path: endo

      - name: Clone Spritely Goblins + goblin-chat from Codeberg
        run: |
          # Both repos are hosted on Codeberg. We pin to explicit commits so CI
          # stays deterministic while still tracking git repositories directly.
          GOBLINS_COMMIT=d42d3a4ff560ecd2a1ac8ef0e44e52ad9e20bdb6
          GOBLIN_CHAT_COMMIT=fd0b3fcec186e54f978fb24b23bb46a65ae2e0a7
          git clone https://codeberg.org/spritely/goblins goblins
          git -C goblins checkout --detach "$GOBLINS_COMMIT"
          git clone https://codeberg.org/spritely/goblin-chat goblin-chat
          git -C goblin-chat checkout --detach "$GOBLIN_CHAT_COMMIT"
          echo "GOBLINS_COMMIT=$GOBLINS_COMMIT" >> "$GITHUB_ENV"
          echo "GOBLIN_CHAT_COMMIT=$GOBLIN_CHAT_COMMIT" >> "$GITHUB_ENV"

      - run: corepack enable
        working-directory: endo

      - name: Use Node.js 20.x
        uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238 # v6
        with:
          node-version: 20.x
          cache: yarn
          cache-dependency-path: endo/yarn.lock

      - name: Install Node dependencies
        working-directory: endo
        run: yarn install --immutable

      - name: Build Endo
        working-directory: endo
        run: yarn build

      # `PromyLOPh/guix-install-action` is a composite action whose
      # `Download` step wgets the Guix nightly tarball from
      # `ci.guix.gnu.org`, which periodically returns sustained 502s
      # for the entire timeout budget of the action. The action has no
      # internal retry; `Wandalen/wretry.action` cannot wrap composite
      # actions; and `nick-fields/retry` only wraps shell commands,
      # not `uses:` blocks. Inline the action's eight steps verbatim
      # from `PromyLOPh/guix-install-action@40615e98e5...` so the
      # wget is a plain shell step we can cache and wrap in
      # `nick-fields/retry`, and so we can configure the daemon to
      # consult `bordeaux.guix.gnu.org` for substitutes when
      # `ci.guix.gnu.org` is degraded.
      - name: Set LANG
        run: echo LANG=en_US.utf8 >> $GITHUB_ENV
      - name: Compute Guix cache key (ISO week)
        # Refresh the cached tarball weekly so we eventually pick up
        # new nightlies, but survive ci.guix.gnu.org outages within a
        # week from a previously-downloaded copy.
        id: guix-cache-key
        run: echo "week=$(date -u +%G-%V)" >> "$GITHUB_OUTPUT"
      - name: Restore Guix nightly tarball cache
        id: guix-cache
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: guix-binary-nightly.x86_64-linux.tar.xz
          key: guix-binary-nightly-x86_64-linux-${{ steps.guix-cache-key.outputs.week }}
          # Fall back to any previous week's tarball when this week's
          # exact key misses; ci.guix.gnu.org is the single point of
          # failure we're hedging against.
          restore-keys: |
            guix-binary-nightly-x86_64-linux-
      - name: Download Guix nightly tarball (skip if cached)
        # `ci.guix.gnu.org/search/latest/archive` periodically returns
        # sustained HTTP 502s for hours, exhausting any reasonable
        # in-step retry budget. Retry briefly (6 attempts at 30 s
        # spacing) so transient errors heal, then fall through to the
        # stable-tarball fallback below. `continue-on-error` keeps
        # the job alive when nightly is unreachable.
        if: ${{ hashFiles('guix-binary-nightly.x86_64-linux.tar.xz') == '' }}
        id: download-nightly
        continue-on-error: true
        uses: nick-fields/retry@ce71cc2ab81d554ebbe88c79ab5975992d79ba08 # v3.0.2
        with:
          max_attempts: 6
          retry_wait_seconds: 30
          timeout_minutes: 3
          command: |
            wget -nv "https://ci.guix.gnu.org/search/latest/archive?query=spec:tarball+status:success+system:x86_64-linux+guix-binary.tar.xz" -O guix-binary-nightly.x86_64-linux.tar.xz
      - name: Download Guix stable tarball as fallback
        # When ci.guix.gnu.org is fully down, GNU's release tarball on
        # ftpmirror.gnu.org is the canonical mirror for the binary
        # install. Pin to 1.5.0 (released 2026-01-22) so the bundled
        # Guile and channel snapshot are recent enough to expose the
        # `spawn` binding goblin-chat depends on; older 1.4.0 is not
        # a usable fallback for that reason. The pinned channel inside
        # the tarball is then refreshed implicitly by `guix build`
        # against bordeaux/ci substitutes, so the older bootstrap is
        # purely a way to get a working `guix` binary on the runner.
        if: ${{ hashFiles('guix-binary-nightly.x86_64-linux.tar.xz') == '' }}
        uses: nick-fields/retry@ce71cc2ab81d554ebbe88c79ab5975992d79ba08 # v3.0.2
        with:
          max_attempts: 6
          retry_wait_seconds: 30
          timeout_minutes: 5
          command: |
            wget -nv "https://ftp.gnu.org/gnu/guix/guix-binary-1.5.0.x86_64-linux.tar.xz" -O guix-binary-nightly.x86_64-linux.tar.xz
      - name: Install Guix
        run: |
          sudo -- tar --extract --file "guix-binary-nightly.x86_64-linux.tar.xz" -C / --no-overwrite-dir
          sudo -- groupadd --system guixbuild

          for i in $(seq -w 1 10); do
              sudo useradd -g guixbuild -G guixbuild -d /var/empty -s "$(which nologin)" -c "Guix build user $i" --system "guixbuilder${i}"
          done

          export GUIX_PATH=/var/guix/profiles/per-user/root/current-guix

          sudo cp "$GUIX_PATH/lib/systemd/system/gnu-store.mount" /etc/systemd/system/
          # Configure the daemon with both substitute servers up front so
          # `guix build` falls back to bordeaux.guix.gnu.org whenever
          # ci.guix.gnu.org is degraded. Both keys are authorized below
          # from the tarball's bundled `share/guix/*.pub` files. Pass
          # `--fallback` so the daemon builds locally rather than failing
          # when neither substitute server has the requested item.
          cat <<'EOF' | sudo tee /etc/systemd/system/guix-daemon.service > /dev/null
          # Service unit file for guix-daemon, modeled on the upstream
          # template in the Guix install tarball but with explicit
          # substitute URLs and --fallback.

          [Unit]
          Description=Build daemon for GNU Guix

          [Service]
          ExecStart=/var/guix/profiles/per-user/root/current-guix/bin/guix-daemon \
              --build-users-group=guixbuild --discover=yes \
              --substitute-urls='https://bordeaux.guix.gnu.org https://ci.guix.gnu.org' \
              --fallback
          Environment='GUIX_LOCPATH=/var/guix/profiles/per-user/root/guix-profile/lib/locale' LC_ALL=en_US.utf8

          StandardOutput=syslog
          StandardError=syslog

          OOMPolicy=continue

          Restart=always

          TasksMax=8192

          [Install]
          WantedBy=multi-user.target
          EOF
          sudo chmod 664 /etc/systemd/system/gnu-store.mount /etc/systemd/system/guix-daemon.service
          sudo systemctl daemon-reload
          sudo systemctl enable --now gnu-store.mount guix-daemon.service

          echo "$GUIX_PATH/bin" >> "$GITHUB_PATH"
      - name: Authorize build farm
        # Authorizes both ci.guix.gnu.org and bordeaux.guix.gnu.org;
        # both .pub files ship inside the Guix tarball under
        # share/guix/.
        run: |
          for F in /var/guix/profiles/per-user/root/current-guix/share/guix/*.pub; do
              sudo /var/guix/profiles/per-user/root/current-guix/bin/guix archive --authorize < "$F"
          done
      - name: Generate keys
        run: sudo /var/guix/profiles/per-user/root/current-guix/bin/guix archive --generate-key

      - name: Report Guix version
        run: guix describe || guix --version

      # The substitute fetches that follow already inherit
      # `--substitute-urls=... --fallback` from the daemon, so they
      # consult bordeaux.guix.gnu.org when ci.guix.gnu.org is degraded
      # and build locally as a last resort. The retry wrapper here is
      # belt-and-braces against transient daemon errors during the
      # bordeaux <-> ci handoff.
      - name: Resolve Guix module paths
        uses: nick-fields/retry@ce71cc2ab81d554ebbe88c79ab5975992d79ba08 # v3.0.2
        with:
          max_attempts: 3
          retry_wait_seconds: 30
          timeout_minutes: 20
          # Build into a scratch file, then promote to $GITHUB_ENV only
          # if all four `guix build` invocations succeed. This keeps
          # retries idempotent: a partial failure on attempt 1 does
          # not pollute the environment seen by attempt 2 or by the
          # rest of the job.
          command: |
            set -euo pipefail
            scratch="$(mktemp)"
            {
              echo "FIBERS_OUT=$(guix build guile-fibers | tail -n 1)"
              echo "WEBSOCKET_OUT=$(guix build guile-websocket | tail -n 1)"
              echo "GNUTLS_OUT=$(guix build guile-gnutls | tail -n 1)"
              echo "GCRYPT_OUT=$(guix build guile-gcrypt | tail -n 1)"
            } > "$scratch"
            cat "$scratch" >> "$GITHUB_ENV"

      - name: Start Guile goblin-chat host
        working-directory: endo
        env:
          INTEROP_CLIENT: ${{ github.workspace }}/endo/packages/goblin-chat/test/guile-interop/interop-client.scm
          GOBLINS_REPO: ${{ github.workspace }}/goblins
          GOBLIN_CHAT_REPO: ${{ github.workspace }}/goblin-chat
        run: |
          # Generate module expected by latest goblins source checkout.
          DOT_PATH="$(command -v dot || echo dot)"
          sed "s|@DOT@|$DOT_PATH|g" \
            "$GOBLINS_REPO/goblins/config.scm.in" \
            > "$GOBLINS_REPO/goblins/config.scm"

          # Runtime compatibility shim while goblin-chat imports the legacy
          # module path `(goblins ghash)`. Goblins moved the module to
          # `(goblins utils ghash)` in v0.16.0 (commit 5587721, 2025-04-30)
          # but goblin-chat has not yet been updated. Drop this once the
          # upstream fix lands: https://codeberg.org/spritely/goblin-chat/pulls/17
          sed -i 's/(goblins ghash)/(goblins utils ghash)/' \
            "$GOBLIN_CHAT_REPO/goblin-chat/backend.scm"

          # Use a non-default port to reduce cross-job collisions.
          OCAPN_TEST_PORT=26804

          # Goblins from raw git source has exhibited interpreter-only failures
          # with auto-compile disabled; allow Guile to compile modules first.
          OCAPN_TEST_PORT="$OCAPN_TEST_PORT" GUILE_AUTO_COMPILE=1 \
            timeout 300s guix shell --pure --no-grafts \
            --preserve='^OCAPN_TEST_PORT$|^GUILE_AUTO_COMPILE$' \
            guile guile-fibers guile-websocket guile-gnutls guile-gcrypt -- \
            guile \
              -L "$FIBERS_OUT/share/guile/site/3.0" \
              -L "$WEBSOCKET_OUT/share/guile/site/3.0" \
              -L "$GNUTLS_OUT/share/guile/site/3.0" \
              -L "$GCRYPT_OUT/share/guile/site/3.0" \
              -L "$GOBLINS_REPO" \
              -L "$GOBLIN_CHAT_REPO" \
              "$INTEROP_CLIENT" \
              "hello from Guile CI" "hello from Endo OCapN" \
              > /tmp/guile-interop.log 2>&1 &
          echo $! > /tmp/guile-interop.pid
          # Wait for the Guile host to advertise its sturdyref.
          for i in $(seq 1 120); do
            if grep -q 'sturdyref:' /tmp/guile-interop.log; then break; fi
            if ! kill -0 "$(cat /tmp/guile-interop.pid)" 2>/dev/null; then break; fi
            sleep 1
          done
          cat /tmp/guile-interop.log
          STURDYREF=$(sed -n 's/.*sturdyref: \(ocapn:[^ ]*\).*/\1/p' /tmp/guile-interop.log | head -n1)
          if [ -z "$STURDYREF" ]; then
            echo "Failed to read sturdyref from Guile host log"
            exit 1
          fi
          echo "STURDYREF=$STURDYREF" >> $GITHUB_ENV

      - name: Run Endo interop client
        working-directory: endo
        env:
          # Newer Goblins reports CapTP version `1.0`.
          OCAPN_CAPTP_VERSION: '1.0'
          OCAPN_INTEROP_GUILE_MESSAGE: hello from Guile CI
          OCAPN_INTEROP_ENDO_MESSAGE: hello from Endo OCapN
          # Endo only needs an outbound websocket client in this flow, so bind
          # its local netlayer listener to an ephemeral port.
          OCAPN_TEST_PORT: '0'
        run: |
          set +e
          timeout 120s node ./packages/goblin-chat/test/guile-interop/index.js "$STURDYREF" \
            > /tmp/endo-interop.log 2>&1
          ENDO_EXIT=$?
          set -e
          echo "ENDO_EXIT=$ENDO_EXIT" >> "$GITHUB_ENV"
          cat /tmp/endo-interop.log

      - name: Assert interop success
        run: |
          test "${ENDO_EXIT:-1}" -eq 0
          # Verify Guile host started and published a sturdyref.
          grep -q 'sturdyref: ocapn:' /tmp/guile-interop.log
          grep -q 'interop-client: subscription ready' /tmp/guile-interop.log
          grep -q 'interop-client: sent message, ack' /tmp/guile-interop.log
          # The Endo participant logs status via the shared
          # `runChatParticipant` driver in @endo/goblin-chat, which prefixes
          # each line with the participant name (`endo-interop-ocapn`). Use
          # fixed-string matching so the brackets stay literal.
          grep -Fq '*** [endo-interop-ocapn] subscription ready' /tmp/endo-interop.log
          grep -Fq '*** [endo-interop-ocapn] sent message, ack =' /tmp/endo-interop.log
          grep -Fq '*** [endo-interop-ocapn] interop observer received message: hello from Guile CI' /tmp/endo-interop.log
          grep -Fq '*** [endo-interop-ocapn] interop observer received message: hello from Endo OCapN' /tmp/endo-interop.log
          grep -Fq '*** Endo interop completed' /tmp/endo-interop.log

      - name: Show interop logs on failure
        if: failure()
        run: |
          echo "=== Guile goblin-chat host log ==="
          cat /tmp/guile-interop.log || echo "(no log)"
          echo "=== Endo interop client log ==="
          cat /tmp/endo-interop.log || echo "(no log)"

      - name: Stop Guile host (always)
        if: always()
        run: |
          if [ -f /tmp/guile-interop.pid ]; then
            kill $(cat /tmp/guile-interop.pid) || true
          fi
