name: OCapN Guile interop

# Mirrors the `test-ocapn-python` job in ci.yml but drives a Goblins (Guile)
# chat client against the Endo `@endo/ocapn` goblin-chat test host over the
# websocket netlayer.
#
# This is scaffolding: it stands up the pieces (Guix toolchain, Spritely
# goblin-chat, Endo chatroom server) and runs a minimal Guile interop
# client. It remains a standalone workflow (`workflow_dispatch`) but should
# fail normally so regressions are visible in PR checks.

on:
  pull_request:
    paths:
      - 'packages/ocapn/**'
      - '.github/workflows/ocapn-guile-interop.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-ocapn-guile-interop:
    name: test-ocapn-guile-interop
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout Endo
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          path: endo

      - name: Clone Spritely goblin-chat (Guile) from Codeberg
        run: |
          # spritely/goblin-chat is hosted on Codeberg, so actions/checkout
          # (which targets github.com) isn't useful here. Pin via
          # `--branch <rev>` once a known-good revision is picked.
          git clone --depth 1 https://codeberg.org/spritely/goblin-chat goblin-chat

      - run: corepack enable
        working-directory: endo

      - name: Use Node.js 20.x
        uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238 # v6
        with:
          node-version: 20.x
          cache: yarn
          cache-dependency-path: endo/yarn.lock

      - name: Install Node dependencies
        working-directory: endo
        run: yarn install --immutable

      - name: Build Endo
        working-directory: endo
        run: yarn build

      - name: Install GNU Guix
        uses: PromyLOPh/guix-install-action@40615e98e5c16a451aec10fe01c214ed07cbaa77 # v1
        with:
          # Skip `guix pull`: the default action behavior updates channels to
          # bleeding edge and costs most of the runtime in this workflow.
          pullAfterInstall: false

      - name: Report Guix version
        run: guix describe || guix --version

      - name: Start Endo goblin-chat host
        working-directory: endo
        env:
          OCAPN_CAPTP_VERSION: goblins-0.16
        run: |
          node ./packages/ocapn/test/goblin-chat/index.js interop-room \
            > /tmp/endo-chat.log 2>&1 &
          echo $! > /tmp/endo-chat.pid
          # Wait for server to advertise its sturdyref.
          for i in $(seq 1 20); do
            if grep -q 'sturdyref:' /tmp/endo-chat.log; then break; fi
            sleep 1
          done
          cat /tmp/endo-chat.log
          STURDYREF=$(sed -n 's/.*sturdyref: \(ocapn:[^ ]*\).*/\1/p' /tmp/endo-chat.log | head -n1)
          if [ -z "$STURDYREF" ]; then
            echo "Failed to read sturdyref from server log"
            exit 1
          fi
          echo "STURDYREF=$STURDYREF" >> $GITHUB_ENV

      - name: Run Guile interop client
        working-directory: goblin-chat
        env:
          INTEROP_CLIENT: ${{ github.workspace }}/endo/packages/ocapn/test/goblin-chat/interop-client.scm
          INTEROP_MANIFEST: ${{ github.workspace }}/endo/packages/ocapn/test/goblin-chat/interop-manifest.scm
          GUILE_AUTO_COMPILE: 0
        run: |
          # Slim manifest: only guile + guile-goblins + guile-fibers.
          # Spritely's goblin-chat/manifest.scm also pulls gtk/g-golf/mesa
          # for its GUI, which the headless interop client doesn't need.
          # Guile load path: `.` picks up goblin-chat/backend.scm from the
          # Spritely checkout (the working directory), and the interop
          # client's own directory for side modules.
          guix shell --pure --no-grafts --manifest="$INTEROP_MANIFEST" -- \
            guile -L . -L "$(dirname "$INTEROP_CLIENT")" \
              "$INTEROP_CLIENT" "$STURDYREF" "hello from Guile CI"

      - name: Show Endo server log on failure
        if: failure()
        run: |
          echo "=== Endo goblin-chat log ==="
          cat /tmp/endo-chat.log || echo "(no log)"

      - name: Stop Endo server
        if: always()
        run: |
          if [ -f /tmp/endo-chat.pid ]; then
            kill $(cat /tmp/endo-chat.pid) || true
          fi
