name: OCapN Guile interop

# Mirrors the `test-ocapn-python` job in ci.yml but drives Endo `@endo/ocapn`
# as a client joining a Goblins (Guile)-hosted chatroom over the websocket
# netlayer.
#
# This is scaffolding: it stands up the pieces (Guix toolchain, Spritely
# goblin-chat, Guile chatroom host, Endo interop client). It remains a
# standalone workflow (`workflow_dispatch`) but should fail normally so
# regressions are visible in PR checks.

on:
  pull_request:
    paths:
      - 'packages/ocapn/**'
      - '.github/workflows/ocapn-guile-interop.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-ocapn-guile-interop:
    name: test-ocapn-guile-interop
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout Endo
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          path: endo

      - name: Clone Spritely goblin-chat (Guile) from Codeberg
        run: |
          # spritely/goblin-chat is hosted on Codeberg, so actions/checkout
          # (which targets github.com) isn't useful here.
          GOBLIN_CHAT_COMMIT=fd0b3fcec186e54f978fb24b23bb46a65ae2e0a7
          git clone https://codeberg.org/spritely/goblin-chat goblin-chat
          git -C goblin-chat checkout --detach "$GOBLIN_CHAT_COMMIT"

      - run: corepack enable
        working-directory: endo

      - name: Use Node.js 20.x
        uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238 # v6
        with:
          node-version: 20.x
          cache: yarn
          cache-dependency-path: endo/yarn.lock

      - name: Install Node dependencies
        working-directory: endo
        run: yarn install --immutable

      - name: Build Endo
        working-directory: endo
        run: yarn build

      - name: Install GNU Guix
        uses: PromyLOPh/guix-install-action@40615e98e5c16a451aec10fe01c214ed07cbaa77 # v1
        with:
          # Skip `guix pull`: the default action behavior updates channels to
          # bleeding edge and costs most of the runtime in this workflow.
          pullAfterInstall: false

      - name: Report Guix version
        run: guix describe || guix --version

      - name: Start Guile goblin-chat host
        working-directory: goblin-chat
        env:
          INTEROP_CLIENT: ${{ github.workspace }}/endo/packages/ocapn/test/goblin-chat/interop-client.scm
          INTEROP_MANIFEST: ${{ github.workspace }}/endo/packages/ocapn/test/goblin-chat/interop-manifest.scm
          INTEROP_ENDO_MESSAGE: hello from Endo OCapN
          GUILE_AUTO_COMPILE: 0
        run: |
          guix shell --pure --no-grafts --manifest="$INTEROP_MANIFEST" -- \
            guile -L . -L "$(dirname "$INTEROP_CLIENT")" \
              "$INTEROP_CLIENT" "hello from Guile CI" "$INTEROP_ENDO_MESSAGE" \
              > /tmp/guile-interop.log 2>&1 &
          echo $! > /tmp/guile-interop.pid
          # Wait for the Guile host to advertise its sturdyref.
          for i in $(seq 1 20); do
            if grep -q 'sturdyref:' /tmp/guile-interop.log; then break; fi
            sleep 1
          done
          cat /tmp/guile-interop.log
          STURDYREF=$(sed -n 's/.*sturdyref: \(ocapn:[^ ]*\).*/\1/p' /tmp/guile-interop.log | head -n1)
          if [ -z "$STURDYREF" ]; then
            echo "Failed to read sturdyref from Guile host log"
            exit 1
          fi
          echo "STURDYREF=$STURDYREF" >> $GITHUB_ENV

      - name: Run Endo interop client
        working-directory: endo
        env:
          OCAPN_CAPTP_VERSION: goblins-0.16
          OCAPN_INTEROP_GUILE_MESSAGE: hello from Guile CI
          OCAPN_INTEROP_ENDO_MESSAGE: hello from Endo OCapN
        run: |
          node ./packages/ocapn/test/goblin-chat/index.js "$STURDYREF" \
            > /tmp/endo-interop.log 2>&1
          cat /tmp/endo-interop.log
          # Guile host should complete once bilateral messaging succeeds.
          wait $(cat /tmp/guile-interop.pid)
          cat /tmp/guile-interop.log

      - name: Assert bilateral message delivery and subscription behavior
        run: |
          # Verify Guile-host side published sturdyref and bilateral assertions.
          grep -q 'sturdyref: ocapn:' /tmp/guile-interop.log
          grep -q 'interop-client: subscription ready' /tmp/guile-interop.log
          grep -q 'observed local+remote messages and ack' /tmp/guile-interop.log
          # Verify Endo-side OCapN observer subscription and two-way message flow.
          grep -q 'Endo interop observer subscription ready' /tmp/endo-interop.log
          grep -q 'Endo interop sent message, ack = "OK"' /tmp/endo-interop.log
          grep -q 'Endo interop observer received both expected messages' /tmp/endo-interop.log
          grep -q 'Endo interop completed' /tmp/endo-interop.log

      - name: Show interop logs on failure
        if: failure()
        run: |
          echo "=== Guile goblin-chat host log ==="
          cat /tmp/guile-interop.log || echo "(no log)"
          echo "=== Endo interop client log ==="
          cat /tmp/endo-interop.log || echo "(no log)"

      - name: Stop Guile host
        if: always()
        run: |
          if [ -f /tmp/guile-interop.pid ]; then
            kill $(cat /tmp/guile-interop.pid) || true
          fi
