name: Update action pins

on:
  schedule:
    - cron: '0 3 * * 1' # Weekly on Monday
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

# Defense in depth against npm lifecycle scripts running implicitly at install.
# See designs/ci-no-npm-lifecycle.md.
env:
  YARN_ENABLE_SCRIPTS: 'false'
  npm_config_ignore_scripts: 'true'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Enable Corepack
        run: corepack enable
      - name: Use Node.js
        uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238 # v6
        with:
          node-version: 22.x
          cache: yarn
      - name: Install dependencies
        run: yarn install --immutable
      - name: Update action pins
        run: node scripts/update-action-pins.mjs --report /tmp/action-pin-report.md
      - name: Create pull request
        uses: peter-evans/create-pull-request@c0f553fe549906ede9cf27b5156039d195d2ece0 # v8
        with:
          commit-message: 'chore: update action pins'
          title: 'chore: update action pins'
          body-path: '/tmp/action-pin-report.md'
          branch: 'chore/update-action-pins'
          labels: 'automation'
