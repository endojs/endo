[package]
name = "endo-os-sel4"
version = "0.1.0"
edition = "2021"
rust-version = "1.85"
description = "Endo OS protection domain for seL4 Microkit (QuickJS)"
license = "Apache-2.0"

[lib]
name = "endo_os_sel4"
path = "src/lib.rs"
crate-type = ["staticlib"]

[dependencies]
# seL4 Microkit runtime for protection domains.
# Not on crates.io — uses the rust-sel4 repository.
sel4-microkit = { git = "https://github.com/seL4/rust-sel4", tag = "v3.0.0" }

# QuickJS JavaScript engine via Rust bindings.
# rquickjs compiles QuickJS from C source — no external dependency.
rquickjs = { version = "0.8", features = ["bindgen", "classes", "properties"] }

[profile.release]
opt-level = "z"
lto = true
strip = true
panic = "abort"
codegen-units = 1
