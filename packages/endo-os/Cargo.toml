[package]
name = "endo-os"
version = "0.1.0"
edition = "2021"
description = "Capability-native OS built around the Endo pet daemon"
license = "Apache-2.0"

[[bin]]
name = "endo-init"
path = "src/bin/main.rs"

[dependencies]
# V8 + runtime infrastructure (same stack as Deno)
deno_core = "0.311"

# Async runtime (deno_core uses tokio internally)
tokio = { version = "1", features = ["full"] }

# Linux device interfaces
nix = { version = "0.29", features = [
  "fs", "ioctl", "mman", "net", "socket", "poll"
] }

# Serialization for device state
serde = { version = "1", features = ["derive"] }
serde_json = "1"

# Error handling
anyhow = "1"

[profile.release]
opt-level = "z"     # Optimize for size
lto = true          # Link-time optimization
strip = true        # Strip debug symbols
panic = "abort"     # No unwinding (we're PID 1)
codegen-units = 1   # Better optimization
