# fly.toml app configuration file generated for endo-relay on 2026-03-12T21:39:13-10:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'endo-relay'
primary_region = 'ord'

[build]

[env]
  PORT = '8080'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'off'
  min_machines_running = 1

  [[http_service.checks]]
    interval = '30s'
    timeout = '5s'
    grace_period = '10s'
    method = 'GET'
    path = '/health'

[[vm]]
  size = 'shared-cpu-1x'
  memory = '256mb'
